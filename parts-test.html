<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>零件小考验</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a237e 0%, #3949ab 50%, #7986cb 100%);
            min-height: 100vh;
            padding: 50px 20px;
            opacity: 1;
            transform: translateY(0);
            position: relative;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInDown 1s ease-out forwards;
            animation-delay: 0.2s;
        }

        .title {
            font-size: 2.5rem;
            font-weight: bold;
            color: white;
            text-align: center;
            margin-bottom: 50px;
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInDown 1s ease-out forwards;
            animation-delay: 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .title-icon {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .title-icon img {
            width: 60px;
            height: 60px;
            filter: brightness(0) invert(1);
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInDown 1s ease-out forwards;
            animation-delay: 0.6s;
        }

        .content-card-link {
            text-decoration: none;
            display: block;
        }

        .content-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            z-index: 10;
            position: relative;
            height: 320px;
            display: flex;
            flex-direction: column;
        }

        .content-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.15);
        }

        .content-card:nth-child(1) {
            animation-delay: 0.8s;
        }

        .content-card:nth-child(2) {
            animation-delay: 1s;
        }

        .content-card:nth-child(3) {
            animation-delay: 1.2s;
        }

        .icon-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation-delay: 0.2s;
        }

        .icon-container img {
            width: 50%;
            height: 50%;
            filter: brightness(0) invert(1);
            animation-delay: 0.4s;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
            margin-bottom: 15px;
            animation-delay: 0.6s;
        }

        .card-description {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.95rem;
            line-height: 1.6;
            animation-delay: 0.8s;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s ease;
            z-index: 9999;
            animation-delay: 1.4s;
        }

        .back-button img {
            width: 50%;
            height: 50%;
            filter: brightness(0) invert(1);
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .footer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            z-index: 20;
            animation-delay: 1.6s;
        }

        .decorative-element {
            position: absolute;
            pointer-events: none;
            z-index: -1;
        }

        .card {
            width: 150px;
            height: 150px;
            opacity: 0.3;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .card-1 {
            top: 5%;
            left: 2%;
            animation: fadeInDownRotate1 1s ease-out forwards;
            animation-delay: 0.3s;
        }

        .card-2 {
            top: 10%;
            right: 2%;
            animation: fadeInDownRotate2 1s ease-out forwards;
            animation-delay: 0.5s;
        }

        .card-3 {
            bottom: 5%;
            right: 2%;
            animation: fadeInDownRotate3 1s ease-out forwards;
            animation-delay: 0.7s;
        }

        @keyframes fadeInDownRotate1 {
            from {
                opacity: 0;
                transform: translateY(-20px) rotate(-15deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotate(-15deg);
            }
        }

        @keyframes fadeInDownRotate2 {
            from {
                opacity: 0;
                transform: translateY(-20px) rotate(20deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotate(20deg);
            }
        }

        @keyframes fadeInDownRotate3 {
            from {
                opacity: 0;
                transform: translateY(-20px) rotate(-10deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotate(-10deg);
            }
        }

        @media (max-width: 768px) {
            .title {
                font-size: 2rem;
                margin-bottom: 30px;
            }

            .content-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .content-card {
                padding: 25px;
            }

            .icon-container {
                width: 60px;
                height: 60px;
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">
            <span class="title-icon">
                <img src="images/编辑文件_file-editing.svg" alt="挑战">
            </span>
            零件小考验
        </h1>
        
        <div class="content-grid">
            <a href="foundation.html" class="content-card-link">
                <div class="content-card">
                    <div class="icon-container">
                        <img src="images/链接_link-three.svg" alt="基础模式">
                    </div>
                    <h2 class="card-title">基础模式</h2>
                    <p class="card-description">适合初学者的基础零件知识测试</p>
                </div>
            </a>

            <a href="difficult.html" class="content-card-link">
                <div class="content-card">
                    <div class="icon-container">
                        <img src="images/搜索_search.svg" alt="困难模式">
                    </div>
                    <h2 class="card-title">困难模式</h2>
                    <p class="card-description">中等难度零件知识测试</p>
                </div>
            </a>

            <a href="max.html" class="content-card-link">
                <div class="content-card">
                    <div class="icon-container">
                        <img src="images/更多2_more-two.svg" alt="大神模式">
                    </div>
                    <h2 class="card-title">大神模式</h2>
                    <p class="card-description">高难度零件知识测试</p>
                </div>
            </a>
        </div>
    </div>

    <a href="main-content.html" class="back-button">
        <img src="images/向下左角_corner-down-left.svg" alt="返回">
    </a>

    <div class="decorative-element card card-1"></div>
    <div class="decorative-element card card-2"></div>
    <div class="decorative-element card card-3"></div>

    <div class="footer">
        <p>handy制作的小网页</p>
    </div>
</body>
</html>
