<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索结果 - 零件档案馆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a237e 0%, #3949ab 50%, #7986cb 100%);
            min-height: 100vh;
            padding: 50px 20px;
            opacity: 1;
            transform: translateY(0);
            position: relative;
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInDown 1s ease-out forwards;
            animation-delay: 0.2s;
        }

        .title {
            font-size: 2.5rem;
            font-weight: bold;
            color: white;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 
                0 0 15px rgba(100, 181, 246, 0.6),
                0 2px 4px rgba(0, 0, 0, 0.4),
                0 4px 8px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInDown 1s ease-out forwards;
            animation-delay: 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .search-container {
            display: flex;
            max-width: 600px;
            margin: 0 auto 40px;
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInDown 1s ease-out forwards;
            animation-delay: 0.5s;
            position: relative;
            z-index: 10;
        }

        .suggestions-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(100, 181, 246, 0.3);
            border-radius: 0 0 15px 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            z-index: 99999;
            max-height: 300px;
            overflow-y: auto;
            display: none;
            pointer-events: auto;
        }

        .suggestions-dropdown.show {
            display: block;
        }

        .suggestion-item {
            padding: 12px 20px;
            cursor: pointer;
            color: #1a237e;
            transition: all 0.2s ease;
            border-bottom: 1px solid rgba(100, 181, 246, 0.1);
        }

        .suggestion-item:hover {
            background: rgba(100, 181, 246, 0.1);
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-highlight {
            font-weight: 600;
            color: #1a237e;
        }

        .search-input {
            flex: 1;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px 0 0 25px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .search-input:focus {
            border-color: rgba(100, 181, 246, 0.8);
            box-shadow: 0 0 15px rgba(100, 181, 246, 0.3);
        }

        .search-button {
            padding: 12px 20px;
            background: rgba(100, 181, 246, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 181, 246, 0.8);
            border-radius: 0 25px 25px 0;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-button:hover {
            background: rgba(100, 181, 246, 1);
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(100, 181, 246, 0.4);
        }

        .search-button img {
            width: 50%;
            height: 50%;
            filter: brightness(0) invert(1);
        }

        .results-section {
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInDown 1s ease-out forwards;
            animation-delay: 0.6s;
        }

        .results-header {
            margin-bottom: 30px;
            text-align: center;
        }

        .results-count {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .result-card:hover {
            background: rgba(100, 181, 246, 0.3);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .result-category {
            font-size: 0.9rem;
            color: rgba(100, 181, 246, 0.9);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .result-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: white;
        }

        .result-description {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .result-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .result-tag {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.2rem;
        }

        .back-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s ease;
            z-index: 9999;
            animation-delay: 1.8s;
        }

        .back-button img {
            width: 50%;
            height: 50%;
            filter: brightness(0) invert(1);
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .footer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            z-index: 20;
            animation-delay: 2s;
        }

        .decorative-element {
            position: absolute;
            pointer-events: none;
            z-index: -1;
        }

        .card {
            width: 150px;
            height: 150px;
            opacity: 0.3;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .card-1 {
            top: 5%;
            left: 2%;
            animation: fadeInDownRotate1 1s ease-out forwards;
            animation-delay: 0.3s;
        }

        .card-2 {
            top: 10%;
            right: 2%;
            animation: fadeInDownRotate2 1s ease-out forwards;
            animation-delay: 0.5s;
        }

        .card-3 {
            bottom: 5%;
            right: 2%;
            animation: fadeInDownRotate3 1s ease-out forwards;
            animation-delay: 0.7s;
        }

        @keyframes fadeInDownRotate1 {
            from {
                opacity: 0;
                transform: translateY(-20px) rotate(-15deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotate(-15deg);
            }
        }

        @keyframes fadeInDownRotate2 {
            from {
                opacity: 0;
                transform: translateY(-20px) rotate(20deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotate(20deg);
            }
        }

        @keyframes fadeInDownRotate3 {
            from {
                opacity: 0;
                transform: translateY(-20px) rotate(-10deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotate(-10deg);
            }
        }

        @media (max-width: 768px) {
            .title {
                font-size: 2rem;
                margin-bottom: 20px;
            }

            .search-container {
                margin-bottom: 30px;
            }

            .results-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .result-card {
                padding: 20px;
            }
        }
    </style>
</head>

                page: 'other-parts.html',
                description: '连接相交轴并允许角度变化的传动元件',
                tags: ['角度补偿', '传动轴', '汽车传动'],
                level: '⭐⭐⭐⭐'
            }
        ];

        function searchParts(query) {
            if (!query.trim()) {
                return [];
            }
            
            query = query.toLowerCase();
            
            return partsData.filter(part => {
                return part.name.toLowerCase().includes(query) ||
                       part.description.toLowerCase().includes(query) ||
                       part.tags.some(tag => tag.toLowerCase().includes(query)) ||
                       part.category.toLowerCase().includes(query);
            });
        }

        function displayResults(results) {
            const resultsGrid = document.getElementById('resultsGrid');
            const resultsCount = document.getElementById('resultsCount');
            
            if (results.length === 0) {
                resultsCount.textContent = '没有找到匹配的零件';
                resultsGrid.innerHTML = `
                    <div class="no-results">
                        <p>没有找到与搜索关键词匹配的零件</p>
                        <p style="margin-top: 10px; font-size: 0.9rem;">请尝试其他关键词或检查拼写</p>
                    </div>
                `;
                return;
            }
            
            resultsCount.textContent = `找到 ${results.length} 个匹配的零件`;
            
            resultsGrid.innerHTML = results.map(part => `
                <div class="result-card" onclick="goToPart('${part.page}', '${part.id}')">
                    <div class="result-category">${part.category}</div>
                    <div class="result-title">${part.name}</div>
                    <div class="result-description">${part.description}</div>
                    <div class="result-tags">
                        ${part.tags.map(tag => `<span class="result-tag">${tag}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function goToPart(page, partId) {
            window.location.href = `${page}#${partId}`;
        }

        // 处理搜索
        document.getElementById('searchButton').addEventListener('click', function() {
            const query = document.getElementById('searchInput').value;
            const results = searchParts(query);
            displayResults(results);
        });

        // 按回车搜索
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const query = this.value;
                const results = searchParts(query);
                displayResults(results);
            }
        });

        // 搜索联想功能
        let suggestionsTimeout;
        const searchInput = document.getElementById('searchInput');
        const suggestionsDropdown = document.getElementById('suggestionsDropdown');
        
        searchInput.addEventListener('input', function() {
            clearTimeout(suggestionsTimeout);
            
            const query = this.value.toLowerCase().trim();
            
            if (query.length > 0) {
                suggestionsTimeout = setTimeout(() => {
                    const suggestions = partsData
                        .filter(part => part.name.toLowerCase().includes(query) || 
                                part.description.toLowerCase().includes(query) ||
                                part.tags.some(tag => tag.toLowerCase().includes(query)) ||
                                part.category.toLowerCase().includes(query))
                        .slice(0, 5);
                    
                    displaySuggestions(suggestions, query);
                }, 300);
            } else {
                hideSuggestions();
            }
        });

        // 点击页面其他地方关闭下拉菜单
        document.addEventListener('click', function(event) {
            if (!searchInput.contains(event.target) && !suggestionsDropdown.contains(event.target)) {
                hideSuggestions();
            }
        });

        // 使用事件委托处理下拉菜单点击
        suggestionsDropdown.addEventListener('click', function(event) {
            console.log('下拉菜单点击事件触发');
            event.stopPropagation(); // 阻止事件冒泡
            const suggestionItem = event.target.closest('.suggestion-item');
            if (suggestionItem) {
                console.log('找到联想项:', suggestionItem.textContent);
                const suggestion = suggestionItem.textContent.trim();
                searchInput.value = suggestion;
                hideSuggestions();
                const results = searchParts(suggestion);
                displayResults(results);
            }
        });

        // 显示联想建议
        function displaySuggestions(suggestions, query) {
            if (suggestions.length === 0) {
                hideSuggestions();
                return;
            }
            
            suggestionsDropdown.innerHTML = suggestions.map(part => {
                const highlightedName = highlightText(part.name, query);
                return `
                    <div class="suggestion-item">
                        ${highlightedName}
                    </div>
                `;
            }).join('');
            
            suggestionsDropdown.classList.add('show');
        }

        // 隐藏联想建议
        function hideSuggestions() {
            suggestionsDropdown.classList.remove('show');
        }

        // 高亮匹配文本
        function highlightText(text, query) {
            const regex = new RegExp(`(${query})`, 'gi');
            return text.replace(regex, '<span class="suggestion-highlight">$1</span>');
        }

        // 页面加载时检查URL参数
        window.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q');
            
            if (query) {
                document.getElementById('searchInput').value = query;
                const results = searchParts(query);
                displayResults(results);
            }
        });
    </script>
</body>
</html>
