<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>零件小考验 - 基础模式</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a237e 0%, #3949ab 50%, #7986cb 100%);
            min-height: 100vh;
            padding: 50px 20px;
            opacity: 1;
            transform: translateY(0);
            position: relative;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInDown 1s ease-out forwards;
            animation-delay: 0.2s;
        }

        .title {
            font-size: 2.5rem;
            font-weight: bold;
            color: white;
            text-align: center;
            margin-bottom: 40px;
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInDown 1s ease-out forwards;
            animation-delay: 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .title-icon {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .title-icon img {
            width: 60px;
            height: 60px;
            filter: brightness(0) invert(1);
        }

        .question-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 30px;
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInDown 1s ease-out forwards;
            animation-delay: 0.6s;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .question-number {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
        }

        .question-progress {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .question-content {
            font-size: 1.3rem;
            color: white;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-item {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .option-item:hover:not(.selected):not(.disabled) {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(5px);
        }

        .option-item.selected {
            background: rgba(76, 175, 80, 0.3);
            border-color: rgba(76, 175, 80, 0.6);
        }

        .option-item.correct {
            background: rgba(76, 175, 80, 0.4);
            border-color: rgba(76, 175, 80, 0.8);
        }

        .option-item.incorrect {
            background: rgba(244, 67, 54, 0.3);
            border-color: rgba(244, 67, 54, 0.6);
        }

        .option-item.disabled {
            cursor: not-allowed;
        }

        .option-letter {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
            font-size: 1rem;
        }

        .option-text {
            color: rgba(255, 255, 255, 0.95);
            font-size: 1.05rem;
            line-height: 1.5;
            padding-top: 4px;
        }

        .answer-section {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            opacity: 0;
            animation: fadeInDown 0.5s ease-out forwards;
        }

        .answer-section.visible {
            opacity: 1;
        }

        .answer-box {
            background: rgba(76, 175, 80, 0.2);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 15px;
        }

        .answer-label {
            font-size: 0.9rem;
            color: rgba(76, 175, 80, 0.8);
            margin-bottom: 5px;
        }

        .answer-text {
            font-size: 1.1rem;
            color: white;
            font-weight: 600;
        }

        .analysis-box {
            background: rgba(33, 150, 243, 0.2);
            border-radius: 12px;
            padding: 15px 20px;
        }

        .analysis-label {
            font-size: 0.9rem;
            color: rgba(33, 150, 243, 0.8);
            margin-bottom: 5px;
        }

        .analysis-text {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
        }

        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInDown 1s ease-out forwards;
            animation-delay: 0.8s;
        }

        .nav-btn {
            flex: 1;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            backdrop-filter: blur(10px);
        }

        .nav-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .nav-btn.submit-btn {
            background: linear-gradient(135deg, #4CAF50, #45a049);
        }

        .nav-btn.submit-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #43a047, #388e3c);
        }

        .result-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInDown 1s ease-out forwards;
        }

        .result-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 25px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-icon img {
            width: 60%;
            height: 60%;
            filter: brightness(0) invert(1);
        }

        .result-title {
            font-size: 2rem;
            color: white;
            margin-bottom: 15px;
        }

        .result-score {
            font-size: 3rem;
            font-weight: bold;
            color: #FFD700;
            margin-bottom: 10px;
        }

        .result-text {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
        }

        .result-remark {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
        }

        .questions-summary {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .questions-summary h3 {
            font-size: 1.3rem;
            color: white;
            margin-bottom: 20px;
            text-align: left;
        }

        .question-summary-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid rgba(255, 255, 255, 0.3);
        }

        .question-summary-item.correct {
            border-left-color: #4CAF50;
            background: rgba(76, 175, 80, 0.1);
        }

        .question-summary-item.incorrect {
            border-left-color: #F44336;
            background: rgba(244, 67, 54, 0.1);
        }

        .question-summary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .question-summary-number {
            font-weight: 600;
            color: white;
        }

        .question-summary-status {
            font-size: 0.9rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 12px;
        }

        .question-summary-status.correct {
            background: rgba(76, 175, 80, 0.3);
            color: #4CAF50;
        }

        .question-summary-status.incorrect {
            background: rgba(244, 67, 54, 0.3);
            color: #F44336;
        }

        .question-summary-content {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .question-summary-answer {
            margin-top: 10px;
        }

        .question-summary-answer-label {
            font-size: 0.9rem;
            color: #4CAF50;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .question-summary-answer-text {
            font-size: 1rem;
            color: white;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .question-summary-analysis {
            margin-top: 10px;
        }

        .question-summary-analysis-label {
            font-size: 0.9rem;
            color: #2196F3;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .question-summary-analysis-text {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.5;
        }

        .restart-btn {
            padding: 15px 40px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .back-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s ease;
            z-index: 9999;
        }

        .back-button img {
            width: 50%;
            height: 50%;
            filter: brightness(0) invert(1);
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .decorative-element {
            position: absolute;
            pointer-events: none;
            z-index: -1;
        }

        .card {
            width: 120px;
            height: 120px;
            opacity: 0.25;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .card-1 {
            top: 5%;
            left: 5%;
            transform: rotate(-15deg);
        }

        .card-2 {
            top: 15%;
            right: 5%;
            transform: rotate(20deg);
        }

        .card-3 {
            bottom: 10%;
            right: 8%;
            transform: rotate(-10deg);
        }

        @media (max-width: 768px) {
            .title {
                font-size: 1.8rem;
                margin-bottom: 30px;
            }

            .title-icon {
                width: 40px;
                height: 40px;
            }

            .question-card {
                padding: 20px;
            }

            .question-content {
                font-size: 1.1rem;
            }

            .option-item {
                padding: 12px 15px;
            }

            .option-letter {
                width: 28px;
                height: 28px;
                font-size: 0.9rem;
            }

            .option-text {
                font-size: 0.95rem;
            }

            .nav-btn {
                padding: 12px 20px;
                font-size: 1rem;
            }

            .result-card {
                padding: 30px 20px;
            }

            .result-icon {
                width: 80px;
                height: 80px;
                font-size: 2.5rem;
            }

            .result-title {
                font-size: 1.5rem;
            }

            .result-score {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="quiz-container">
        <h1 class="title">
            <span class="title-icon">
                <img src="images/链接_link-three.svg" alt="基础模式">
            </span>
            基础模式
        </h1>

        <div class="question-card">
            <div class="question-header">
                <span class="question-number">题目 <span id="current-question">1</span></span>
                <span class="question-progress"><span id="answered-count">0</span>/5</span>
            </div>
            
            <div class="question-content" id="question-text">加载中...</div>
            
            <div class="options-list" id="options-container">
                <div class="option-item" onclick="selectOption(this)">
                    <span class="option-letter">A</span>
                    <span class="option-text">选项A</span>
                </div>
                <div class="option-item" onclick="selectOption(this)">
                    <span class="option-letter">B</span>
                    <span class="option-text">选项B</span>
                </div>
                <div class="option-item" onclick="selectOption(this)">
                    <span class="option-letter">C</span>
                    <span class="option-text">选项C</span>
                </div>
                <div class="option-item" onclick="selectOption(this)">
                    <span class="option-letter">D</span>
                    <span class="option-text">选项D</span>
                </div>
            </div>

            <div class="answer-section" id="answer-section">
                <div class="answer-box">
                    <div class="answer-label">正确答案</div>
                    <div class="answer-text" id="correct-answer"></div>
                </div>
                <div class="analysis-box">
                    <div class="analysis-label">解析</div>
                    <div class="analysis-text" id="analysis-text"></div>
                </div>
            </div>
        </div>

        <div class="navigation-buttons">
            <button class="nav-btn" id="prev-btn" onclick="prevQuestion()" disabled>上一题</button>
            <button class="nav-btn" id="next-btn" onclick="nextQuestion()">下一题</button>
            <button class="nav-btn submit-btn" id="submit-btn" onclick="submitQuiz()">提交答案</button>
        </div>
    </div>

    <div class="container" id="result-container" style="display: none;">
        <div class="result-card">
            <div class="result-icon"><img src="images/手柄圆圈_handle-round.svg" id="result-emoji" alt="结果"></div>
            <h2 class="result-title">测试完成!</h2>
            <div class="result-score" id="final-score">0/5</div>
            <p class="result-text" id="result-message"></p>
            <p class="result-remark" id="result-remark"></p>
            
            <div class="questions-summary" id="questions-summary">
                <h3>本次测试题目</h3>
                <!-- 题目汇总将通过JavaScript动态生成 -->
            </div>
            
            <button class="restart-btn" onclick="restartQuiz()">再试一次</button>
        </div>
    </div>

    <a href="parts-test.html" class="back-button">
        <img src="images/向下左角_corner-down-left.svg" alt="返回">
    </a>

    <div class="decorative-element card card-1"></div>
    <div class="decorative-element card card-2"></div>
    <div class="decorative-element card card-3"></div>

    <script>
        const allQuestions = [
            {"question":"以下哪个零件主要用于连接两个带有通孔的零件，并使用螺母进行固定？","options":["A. 螺钉","B. 螺栓","C. 销","D. 铆钉"],"answer":"B","analysis":"螺栓通常与螺母配合，用于连接两个通孔零件。螺钉一般直接旋入螺纹孔，销用于定位，铆钉用于不可拆卸连接。"},
            {"question":"与六角螺栓配合使用，起紧固作用的零件是？","options":["A. 弹簧垫圈","B. 平垫圈","C. 六角螺母","D. 开口销"],"answer":"C","analysis":"六角螺母与六角螺栓的螺纹配合，是标准的紧固件对。"},
            {"question":"下列哪种垫圈具有防松功能，其断面呈椭圆形？","options":["A. 平垫圈","B. 弹簧垫圈","C. 齿形垫圈","D. 橡胶垫圈"],"answer":"B","analysis":"弹簧垫圈有弹性，装配后压平产生弹力，防止螺母松动。"},
            {"question":"十字槽螺钉的典型特征是其头部有？","options":["A. 一字槽","B. 十字槽","C. 内六角孔","D. 外六角头"],"answer":"B","analysis":"十字槽螺钉的名称直接来源于其头部的十字形凹槽，需用十字螺丝刀拧紧。"},
            {"question":"内六角螺钉需要使用什么工具进行拆装？","options":["A. 活动扳手","B. 梅花扳手","C. 内六角扳手","D. 螺丝刀"],"answer":"C","analysis":"内六角螺钉的头部中心有一个六角形沉孔，必须使用相应尺寸的内六角扳手。"},
            {"question":"圆柱销和圆锥销的主要作用是什么？","options":["A. 连接并传递大扭矩","B. 轴向固定零件","C. 定位或连接","D. 防松"],"answer":"C","analysis":"销主要用于零件之间的定位，也可用于传递不大的载荷或作为安全装置。"},
            {"question":"平键连接主要用于传递什么？","options":["A. 轴向力","B. 径向力","C. 扭矩","D. 弯矩"],"answer":"C","analysis":"平键安装在轴和轮毂的键槽中，主要作用是传递扭矩，实现周向固定。"},
            {"question":"半圆键的典型应用场合是？","options":["A. 重载高速轴","B. 锥形轴端","C. 薄壁结构","D. 需要轴向滑移的轴"],"answer":"B","analysis":"半圆键能在轴槽中自动适应轮毂槽底，特别适合锥形轴端的连接。"},
            {"question":"铆钉连接是一种？","options":["A. 可拆卸连接","B. 不可拆卸连接","C. 可调连接","D. 滑动连接"],"answer":"B","analysis":"铆接是通过铆钉变形将零件永久固定在一起，除非破坏铆钉，否则无法拆卸。"},
            {"question":"最常见的直齿圆柱齿轮用于传递什么运动？","options":["A. 交错轴间的旋转运动","B. 平行轴间的旋转运动","C. 垂直相交轴间的旋转运动","D. 直线运动"],"answer":"B","analysis":"两个直齿圆柱齿轮啮合，其轴线是相互平行的。"},
            {"question":"斜齿轮与直齿轮相比，一个显著优点是？","options":["A. 制造更简单","B. 没有轴向力","C. 传动更平稳，噪音小","D. 成本更低"],"answer":"C","analysis":"斜齿轮的齿是逐渐啮入和啮出的，重合度大，因此传动平稳，冲击和噪音小。"},
            {"question":"锥齿轮通常用于传递什么位置关系的运动？","options":["A. 平行轴","B. 相交轴","C. 交错轴","D. 任意轴"],"answer":"B","analysis":"锥齿轮用于两轴线相交的传动，最常见的是90°相交。"},
            {"question":"在蜗轮蜗杆传动中，通常哪个零件是主动件？","options":["A. 蜗轮","B. 蜗杆","C. 两者均可","D. 视情况而定"],"answer":"B","analysis":"标准蜗轮蜗杆传动中，蜗杆是主动件，蜗轮是从动件，能获得很大的传动比。"},
            {"question":"V带轮的轮槽截面是什么形状？","options":["A. 矩形","B. 梯形","C. 圆形","D. 三角形"],"answer":"B","analysis":"V带嵌入带轮轮槽中，轮槽的截面呈梯形，两侧面与V带侧面接触。"},
            {"question":"链传动与带传动相比，主要优点是？","options":["A. 无噪音","B. 无需润滑","C. 无滑动，传动比准确","D. 结构简单"],"answer":"C","analysis":"链传动是啮合传动，无弹性滑动和打滑现象，能保持准确的传动比。"},
            {"question":"弹性联轴器与刚性联轴器的主要区别是？","options":["A. 能否补偿两轴相对位移","B. 能否传递更大扭矩","C. 价格高低","D. 结构复杂程度"],"answer":"A","analysis":"弹性联轴器能补偿两轴间的偏移并缓冲减振，而刚性联轴器不能。"},
            {"question":"离合器的主要功能是？","options":["A. 永久连接两轴","B. 机器运转中随时接合或分离两轴","C. 过载保护","D. 改变转速"],"answer":"B","analysis":"离合器用于在机器工作时，根据需求随时将主动轴与从动轴接合或分离。"},
            {"question":"最常见的滚动轴承由内圈、外圈、滚动体和什么组成？","options":["A. 保持架","B. 密封圈","C. 挡圈","D. 油嘴"],"answer":"A","analysis":"滚动轴承的四大基本元件是：内圈、外圈、滚动体和保持架。保持架用于隔离滚动体。"},
            {"question":"角接触球轴承主要能承受什么载荷？","options":["A. 纯径向载荷","B. 纯轴向载荷","C. 径向和单向轴向联合载荷","D. 冲击载荷"],"answer":"C","analysis":"角接触球轴承的接触角使其能同时承受径向载荷和较大的单向轴向载荷。"},
            {"question":"圆柱滚子轴承的滚动体是圆柱形，其特点是？","options":["A. 极限转速高","B. 承受径向载荷能力大","C. 能自动调心","D. 噪音很小"],"answer":"B","analysis":"圆柱滚子轴承的滚动体与滚道是线接触，承载能力比球轴承大得多，尤其适合重载。"},
            {"question":"滑动轴承通常用于什么场合？","options":["A. 超高速、高精度","B. 重载、低速","C. 任意场合","D. 无需润滑的场合"],"answer":"A","analysis":"滑动轴承特别是液体润滑滑动轴承，能承受极高转速和极高精度，常用于机床主轴等。"},
            {"question":"导轨的主要作用是什么？","options":["A. 支撑和导向","B. 传递动力","C. 密封","D. 连接"],"answer":"A","analysis":"导轨用于支撑运动部件并使其沿着精确的轨迹运动。"},
            {"question":"带头导柱和导套通常配合使用在什么模具中？","options":["A. 铸造模具","B. 注塑模具","C. 冲压模具","D. 所有模具"],"answer":"C","analysis":"带头导柱和导套是冲压模具（冲模）中最常用的导向组件。"},
            {"question":"阶梯轴的主要特征是什么？","options":["A. 直径完全相同","B. 直径有多个变化","C. 截面为方形","D. 内部中空"],"answer":"B","analysis":"阶梯轴由不同直径的轴段组成，便于安装轴承、齿轮等不同零件。"},
            {"question":"压缩弹簧在受到轴向压力时，其状态是？","options":["A. 被拉伸","B. 被压缩","C. 产生扭转","D. 无变化"],"answer":"B","analysis":"压缩弹簧的设计目的是抵抗轴向压缩，在外力作用下长度变短。"},
            {"question":"拉伸弹簧通常两端会做成什么形状以便于固定？","options":["A. 钩环","B. 平面","C. 锥形","D. 封闭端"],"answer":"A","analysis":"拉伸弹簧的典型端部结构是拉钩或圆环，用于连接外部零件。"},
            {"question":"扭簧承受的载荷类型是？","options":["A. 拉力","B. 压力","C. 扭矩","D. 弯矩"],"answer":"C","analysis":"扭簧依靠其弹性来承受扭矩或旋转力。"},
            {"question":"O型圈的主要作用是什么？","options":["A. 紧固","B. 定位","C. 密封","D. 导向"],"answer":"C","analysis":"O型圈是应用最广泛的橡胶密封件，用于静态或动态密封。"},
            {"question":"油杯的作用是什么？","options":["A. 储存润滑油","B. 向摩擦点添加润滑油","C. 过滤润滑油","D. 测量油位"],"answer":"B","analysis":"油杯是一种简易的润滑装置，安装在需要定期加油的部位，方便注油。"},
            {"question":"孔用挡圈安装在什么位置？","options":["A. 轴的凹槽上","B. 孔的内壁凹槽上","C. 零件端面","D. 螺纹上"],"answer":"B","analysis":"孔用挡圈安装在圆孔内部的沟槽中，用于防止孔内零件（如轴承）轴向移动。"},
            {"question":"轴用挡圈安装在什么位置？","options":["A. 轴的凹槽上","B. 孔的内壁凹槽上","C. 零件端面","D. 螺纹上"],"answer":"A","analysis":"轴用挡圈安装在轴上的沟槽中，用于防止轴上零件（如轴承）轴向移动。"},
            {"question":"法兰盘通常用于什么？","options":["A. 轴与轴的连接","B. 管与管或管与设备的连接","C. 齿轮的固定","D. 轴承的润滑"],"answer":"B","analysis":"法兰盘是带有螺栓孔的圆盘，用于管道、阀门、泵等之间的可拆卸连接。"},
            {"question":"万向轴的主要功能是？","options":["A. 传递等速运动","B. 传递有一定夹角的两轴之间的运动","C. 改变转速","D. 缓冲减振"],"answer":"B","analysis":"万向轴允许两轴轴线之间有较大的夹角（通常可达30°-40°），并能传递运动和扭矩。"},
            {"question":"平垫圈的主要作用是什么？","options":["A. 防松","B. 增大接触面积，保护零件表面","C. 轴向定位","D. 密封"],"answer":"B","analysis":"平垫圈垫在螺母或螺栓头下方，可以增大接触面积，减小压强，防止损伤零件表面。"},
            {"question":"同步带轮与同步带配合，其传动特点是？","options":["A. 有弹性滑动","B. 传动比不准确","C. 无滑动，传动比准确","D. 需要润滑"],"answer":"C","analysis":"同步带内侧有齿，与带轮的齿槽啮合，属于啮合传动，无相对滑动，保证同步。"},
            {"question":"下列哪种轴承主要承受径向载荷，且不能承受轴向载荷？","options":["A. 深沟球轴承","B. 角接触球轴承","C. 推力球轴承","D. 圆柱滚子轴承 (N型)"],"answer":"D","analysis":"N型圆柱滚子轴承（无挡边）只能承受纯径向载荷，不能承受任何轴向载荷。"},
            {"question":"蝶形弹簧的形状像什么？","options":["A. 圆环","B. 圆盘","C. 圆盘状锥形","D. 螺旋形"],"answer":"C","analysis":"蝶形弹簧是一种圆锥形盘状弹簧，可以单个或组合使用。"},
            {"question":"气弹簧支撑杆利用什么原理工作？","options":["A. 弹簧压缩","B. 气体压力","C. 液压阻尼","D. 电磁力"],"answer":"B","analysis":"气弹簧内部充有高压惰性气体，利用气体压力差来提供支撑力和缓冲。"},
            {"question":"蜗轮和蜗杆的轴线在空间中的位置关系是？","options":["A. 平行","B. 相交","C. 垂直交错","D. 任意"],"answer":"C","analysis":"蜗杆的轴线与蜗轮的轴线在空间上互相垂直，但不相交，属于交错轴传动。"},
            {"question":"V带轮的基准直径是指什么位置的直径？","options":["A. 带轮外径","B. 轮槽底径","C. 与V带节宽相对应的直径","D. 最小直径"],"answer":"C","analysis":"基准直径是V带轮上与V带节宽相对应的直径，用于计算传动比和带长。"},
            {"question":"滚动轴承的内圈通常与什么配合？","options":["A. 轴承座孔","B. 轴","C. 端盖","D. 密封圈"],"answer":"B","analysis":"滚动轴承的内圈孔是基准孔，与轴颈（轴的外圆）配合。"},
            {"question":"滚动轴承的外圈通常与什么配合？","options":["A. 轴","B. 滚动体","C. 轴承座孔","D. 保持架"],"answer":"C","analysis":"滚动轴承的外圈外圆柱面是基准轴，与轴承座的内孔配合。"},
            {"question":"与普通平键相比，半圆键的一个优点是？","options":["A. 承载能力更大","B. 对轴削弱更小","C. 能自动适应轮毂槽底","D. 轴向固定效果好"],"answer":"C","analysis":"半圆键能在轴槽中摆动，自动适应轮毂槽底的倾斜角度，非常适合锥形轴端。"},
            {"question":"下列哪种联轴器属于刚性联轴器？","options":["A. 梅花形联轴器","B. 十字滑块联轴器","C. 凸缘联轴器","D. 柱销联轴器"],"answer":"C","analysis":"凸缘联轴器（法兰联轴器）是典型的刚性联轴器，无补偿能力。"},
            {"question":"离合器与联轴器的本质区别是？","options":["A. 离合器传递扭矩小","B. 联轴器只能在停机时拆装","C. 离合器结构更复杂","D. 联轴器需要润滑"],"answer":"B","analysis":"联轴器通常需要停机才能实现两轴的连接或分离，而离合器可在机器运转中操作。"},
            {"question":"压缩弹簧的弹簧直径分为外径、内径和什么？","options":["A. 中径","B. 线径","C. 有效直径","D. 平均直径"],"answer":"A","analysis":"压缩弹簧的三个直径参数是：外径、内径和中径（平均直径）。"},
            {"question":"导套和导柱的配合性质通常是？","options":["A. 过盈配合","B. 间隙配合","C. 过渡配合","D. 过盈或过渡"],"answer":"B","analysis":"为了导向顺畅，导套与导柱之间必须采用小间隙的间隙配合。"},
            {"question":"油杯通常安装在机器的什么位置？","options":["A. 最高点","B. 最低点","C. 需要润滑的摩擦副附近","D. 任意位置"],"answer":"C","analysis":"油杯应安装在靠近轴承、滑套等需要定期润滑的部位，方便润滑脂或油进入。"},
            {"question":"法兰式滑动轴承的“法兰”部分主要起什么作用？","options":["A. 承受径向力","B. 承受轴向力","C. 散热","D. 润滑"],"answer":"B","analysis":"法兰式滑动轴承的法兰端面用于承受轴向载荷，起到推力轴承的作用。"},
            {"question":"扭簧的簧圈在受载时，其直径会如何变化？","options":["A. 变大","B. 变小","C. 基本不变","D. 不规则变化"],"answer":"C","analysis":"扭簧承受扭矩时，簧圈直径基本保持不变，主要是簧圈之间产生角度变形。"}
        ];

        let currentQuestions = [];
        let currentIndex = 0;
        let userAnswers = {};
        let submitted = false;

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function initQuiz() {
            const shuffled = shuffleArray(allQuestions);
            currentQuestions = shuffled.slice(0, 5);
            currentIndex = 0;
            userAnswers = {};
            submitted = false;
            loadQuestion();
        }

        function loadQuestion() {
            const question = currentQuestions[currentIndex];
            const options = shuffleArray([...question.options]);
            
            document.getElementById('current-question').textContent = currentIndex + 1;
            document.getElementById('question-text').textContent = question.question;
            
            const optionsContainer = document.getElementById('options-container');
            const optionItems = optionsContainer.querySelectorAll('.option-item');
            
            options.forEach((option, index) => {
                const letter = String.fromCharCode(65 + index);
                optionItems[index].querySelector('.option-letter').textContent = letter;
                optionItems[index].querySelector('.option-text').textContent = option.substring(3);
                optionItems[index].dataset.letter = letter;
                optionItems[index].dataset.answer = option.charAt(0);
                optionItems[index].className = 'option-item';
            });

            document.getElementById('answer-section').className = 'answer-section';
            
            if (userAnswers[currentIndex] !== undefined) {
                for (let i = 0; i < optionItems.length; i++) {
                    if (optionItems[i].dataset.letter === userAnswers[currentIndex]) {
                        optionItems[i].classList.add('selected');
                        break;
                    }
                }
            }

            updateNavigation();
        }

        function selectOption(item) {
            if (submitted) return;
            
            const options = document.querySelectorAll('.option-item');
            options.forEach(opt => opt.classList.remove('selected'));
            item.classList.add('selected');
            
            userAnswers[currentIndex] = item.dataset.letter;
            updateAnsweredCount();
        }

        function updateAnsweredCount() {
            const count = Object.keys(userAnswers).length;
            document.getElementById('answered-count').textContent = count;
        }

        function updateNavigation() {
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            const submitBtn = document.getElementById('submit-btn');
            
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = submitted;
            
            if (currentIndex === currentQuestions.length - 1) {
                nextBtn.style.display = 'none';
                submitBtn.style.display = 'block';
            } else {
                nextBtn.style.display = 'block';
                submitBtn.style.display = 'none';
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                loadQuestion();
            }
        }

        function nextQuestion() {
            if (currentIndex < currentQuestions.length - 1) {
                currentIndex++;
                loadQuestion();
            }
        }

        function submitQuiz() {
            submitted = true;
            showAnswer();
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('submit-btn').style.display = 'none';
            
            setTimeout(() => {
                showResult();
            }, 1500);
        }

        function showAnswer() {
            const question = currentQuestions[currentIndex];
            const options = document.querySelectorAll('.option-item');
            
            options.forEach(option => {
                option.classList.add('disabled');
                if (option.dataset.answer === question.answer) {
                    option.classList.add('correct');
                } else if (option.classList.contains('selected') && option.dataset.answer !== question.answer) {
                    option.classList.add('incorrect');
                }
            });

            // 找到正确答案对应的选项文字
            let correctOptionText = question.answer;
            question.options.forEach(option => {
                if (option.charAt(0) === question.answer) {
                    correctOptionText = option;
                }
            });

            document.getElementById('correct-answer').textContent = correctOptionText;
            document.getElementById('analysis-text').textContent = question.analysis;
            document.getElementById('answer-section').className = 'answer-section visible';
        }

        function showResult() {
            let correctCount = 0;
            const questionsSummary = document.getElementById('questions-summary');
            questionsSummary.innerHTML = '<h3>本次测试题目</h3>';
            
            currentQuestions.forEach((q, index) => {
                const selectedLetter = userAnswers[index];
                let selectedAnswer = '';
                let isCorrect = false;
                
                if (selectedLetter !== undefined) {
                    const options = document.querySelectorAll('.option-item');
                    options.forEach(opt => {
                        if (opt.dataset.letter === selectedLetter) {
                            selectedAnswer = opt.dataset.answer;
                        }
                    });
                    isCorrect = (selectedAnswer === q.answer);
                    if (isCorrect) {
                        correctCount++;
                    }
                }
                
                // 找到正确答案对应的选项文字
                let correctOptionText = q.answer;
                q.options.forEach(option => {
                    if (option.charAt(0) === q.answer) {
                        correctOptionText = option;
                    }
                });
                
                // 生成题目汇总HTML
                const questionItem = document.createElement('div');
                questionItem.className = `question-summary-item ${isCorrect ? 'correct' : 'incorrect'}`;
                
                questionItem.innerHTML = `
                    <div class="question-summary-header">
                        <span class="question-summary-number">题目 ${index + 1}</span>
                        <span class="question-summary-status ${isCorrect ? 'correct' : 'incorrect'}">
                            ${isCorrect ? '正确' : '错误'}
                        </span>
                    </div>
                    <div class="question-summary-content">${q.question}</div>
                    <div class="question-summary-answer">
                        <div class="question-summary-answer-label">正确答案</div>
                        <div class="question-summary-answer-text">${correctOptionText}</div>
                    </div>
                    <div class="question-summary-analysis">
                        <div class="question-summary-analysis-label">解析</div>
                        <div class="question-summary-analysis-text">${q.analysis}</div>
                    </div>
                `;
                
                questionsSummary.appendChild(questionItem);
            });

            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('result-container').style.display = 'block';
            
            document.getElementById('final-score').textContent = `${correctCount}/5`;
            
            let icon, message, remark;
            if (correctCount === 5) {
                icon = 'images/手柄圆圈_handle-round.svg';
                message = '太棒了！你是基础模式的王者！';
                remark = '恭喜你全部答对！你的机械零件基础知识非常扎实！';
            } else if (correctCount >= 4) {
                icon = 'images/更多2_more-two.svg';
                message = '非常出色！继续保持！';
                remark = '你已经掌握了大部分基础知识点，继续努力！';
            } else if (correctCount >= 3) {
                icon = 'images/书签_bookmark-one.svg';
                message = '做得不错！还有提升空间！';
                remark = '基础知识掌握得还可以，建议多复习错题部分。';
            } else if (correctCount >= 2) {
                icon = 'images/编辑文件_file-editing.svg';
                message = '加油！多练习会更好！';
                remark = '还需要加强基础知识学习，多做练习巩固！';
            } else {
                icon = 'images/书籍1_book-one.svg';
                message = '需要多加练习！';
                remark = '建议先复习基础概念，再进行测试。';
            }
            
            document.getElementById('result-emoji').src = icon;
            document.getElementById('result-message').textContent = message;
            document.getElementById('result-remark').textContent = remark;
        }

        function restartQuiz() {
            document.getElementById('result-container').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';
            initQuiz();
        }

        window.addEventListener('DOMContentLoaded', initQuiz);
    </script>

</html>
