<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帮零件找名字</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a237e 0%, #3949ab 50%, #7986cb 100%);
            min-height: 100vh;
            padding: 50px 20px;
            opacity: 1;
            transform: translateY(0);
            position: relative;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInDown 1s ease-out forwards;
            animation-delay: 0.2s;
        }

        .title {
            font-size: 2.5rem;
            font-weight: bold;
            color: white;
            text-align: center;
            margin-bottom: 50px;
            text-shadow: 
                0 0 15px rgba(100, 181, 246, 0.6),
                0 2px 4px rgba(0, 0, 0, 0.4),
                0 4px 8px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInDown 1s ease-out forwards;
            animation-delay: 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .description {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 60px;
            line-height: 1.6;
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInDown 1s ease-out forwards;
            animation-delay: 0.6s;
        }

        .mode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 40px;
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInDown 1s ease-out forwards;
            animation-delay: 0.8s;
        }

        .mode-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            z-index: 10;
            position: relative;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .mode-card:nth-child(1) {
            animation-delay: 1s;
        }

        .mode-card:nth-child(2) {
            animation-delay: 1.2s;
        }

        .mode-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.2);
        }

        .mode-icon-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 25px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation-delay: 0.2s;
        }

        .mode-icon-container img {
            width: 60%;
            height: 60%;
            filter: brightness(0) invert(1);
            animation-delay: 0.4s;
        }

        .mode-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
            margin-bottom: 15px;
            animation-delay: 0.6s;
        }

        .mode-description {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
            line-height: 1.6;
            animation-delay: 0.8s;
            flex: 1;
            margin-bottom: 20px;
        }

        .mode-button {
            padding: 15px 30px;
            background: rgba(100, 181, 246, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 181, 246, 0.8);
            border-radius: 30px;
            color: white;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            animation-delay: 1s;
        }

        .mode-button:hover {
            background: rgba(100, 181, 246, 1);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(100, 181, 246, 0.4);
        }

        .back-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s ease;
            z-index: 9999;
            animation-delay: 1.8s;
        }

        .home-button {
            position: fixed;
            bottom: 30px;
            right: 100px;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s ease;
            z-index: 9999;
            animation-delay: 1.8s;
        }

        .home-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .main-content-button {
            position: fixed;
            bottom: 30px;
            right: 170px;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s ease;
            z-index: 9999;
            animation-delay: 1.8s;
        }

        .main-content-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .back-button img {
            width: 50%;
            height: 50%;
            filter: brightness(0) invert(1);
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .footer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            z-index: 20;
            animation-delay: 2s;
        }

        .decorative-element {
            position: absolute;
            pointer-events: none;
            z-index: -1;
        }

        .card {
            width: 150px;
            height: 150px;
            opacity: 0.3;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .card-1 {
            top: 5%;
            left: 2%;
            animation: fadeInDownRotate1 1s ease-out forwards;
            animation-delay: 0.3s;
        }

        .card-2 {
            top: 10%;
            right: 2%;
            animation: fadeInDownRotate2 1s ease-out forwards;
            animation-delay: 0.5s;
        }

        .card-3 {
            bottom: 5%;
            right: 2%;
            animation: fadeInDownRotate3 1s ease-out forwards;
            animation-delay: 0.7s;
        }

        @keyframes fadeInDownRotate1 {
            from {
                opacity: 0;
                transform: translateY(-20px) rotate(-15deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotate(-15deg);
            }
        }

        @keyframes fadeInDownRotate2 {
            from {
                opacity: 0;
                transform: translateY(-20px) rotate(20deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotate(20deg);
            }
        }

        @keyframes fadeInDownRotate3 {
            from {
                opacity: 0;
                transform: translateY(-20px) rotate(-10deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotate(-10deg);
            }
        }

        @media (max-width: 768px) {
            .title {
                font-size: 2rem;
                margin-bottom: 30px;
            }

            .description {
                font-size: 1rem;
                margin-bottom: 40px;
            }

            .mode-grid {
                grid-template-columns: 1fr;
                gap: 25px;
            }

            .mode-card {
                padding: 30px;
                min-height: 250px;
            }

            .mode-icon-container {
                width: 80px;
                height: 80px;
            }

            .back-button {
                bottom: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
            }

            .home-button {
                bottom: 20px;
                right: 80px;
                width: 50px;
                height: 50px;
            }

            .main-content-button {
                bottom: 20px;
                right: 140px;
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">
            <img src="images/书签_bookmark-one.svg" alt="帮零件找名字" style="width: 60px; height: 60px; filter: brightness(0) invert(1);">
            帮零件找名字
        </h1>
        
        <p class="description">
            通过有趣的互动游戏，帮助你快速识别和记忆各种机械零件的名称，提升认知能力
        </p>
        
        <div class="mode-grid">
            <a href="simple-mode.html" style="text-decoration: none;">
                <div class="mode-card">
                    <div class="mode-icon-container">
                        <img src="images/手柄圆圈_handle-round.svg" alt="简单模式">
                    </div>
                    <h2 class="mode-title">简单模式</h2>
                    <p class="mode-description">
                        看零件图，选择正确的名字。适合初学者，帮助你快速熟悉各种机械零件的外观特征和名称对应关系。
                    </p>
                </div>
            </a>

            <a href="super-mode.html" style="text-decoration: none;">
                <div class="mode-card">
                    <div class="mode-icon-container">
                        <img src="images/设置_setting.svg" alt="超能模式">
                    </div>
                    <h2 class="mode-title">超能模式</h2>
                    <p class="mode-description">
                        看文字描述，选择对应的零件名字或零件图。挑战你的机械知识，测试你对零件功能和特征的理解。
                    </p>
                </div>
            </a>
        </div>
    </div>

    <a href="index.html" class="home-button">
        <svg width="24" height="24" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 18V42H39V18L24 6L9 18Z" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M19 29V42H29V29H19Z" fill="none" stroke="white" stroke-width="4" stroke-linejoin="round"/>
            <path d="M9 42H39" stroke="white" stroke-width="4" stroke-linecap="round"/>
        </svg>
    </a>
    <a href="main-content.html" class="main-content-button">
        <svg width="24" height="24" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M48 0H0V48H48V0Z" fill="white" fill-opacity="0.01"/>
            <path d="M34 5H8C6.34315 5 5 6.34315 5 8V34C5 35.6569 6.34315 37 8 37H34C35.6569 37 37 35.6569 37 34V8C37 6.34315 35.6569 5 34 5Z" fill="none" stroke="white" stroke-width="4" stroke-linejoin="round"/>
            <path d="M43.9998 13.002V42.0001C43.9998 43.1046 43.1044 44.0001 41.9998 44.0001H13.0034" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M13 20.4858L18.9997 26.0109L29 15.7192" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </a>
    <a href="main-content.html" class="back-button">
        <img src="images/向下左角_corner-down-left.svg" alt="返回">
    </a>

    <div class="decorative-element card card-1"></div>
    <div class="decorative-element card card-2"></div>
    <div class="decorative-element card card-3"></div>

    <div class="footer">
        <p>handy制作的小网页</p>
    </div>


</body>
</html>
