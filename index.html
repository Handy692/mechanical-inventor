<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机械发明家 - 零件的奇妙配对</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDownRotate1 {
            from {
                opacity: 0;
                transform: translateY(-20px) rotate(-15deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotate(-15deg);
            }
        }

        @keyframes fadeInDownRotate2 {
            from {
                opacity: 0;
                transform: translateY(-20px) rotate(20deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotate(20deg);
            }
        }

        @keyframes fadeInDownRotate3 {
            from {
                opacity: 0;
                transform: translateY(-20px) rotate(-10deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotate(-10deg);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a237e 0%, #3949ab 50%, #7986cb 100%);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            opacity: 1;
            transform: translateY(0);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 30;
            animation-delay: 0.2s;
        }

        .header {
            max-width: 600px;
            animation-delay: 0.4s;
        }

        .title {
            font-size: 3.5rem;
            font-weight: bold;
            color: white;
            text-shadow: 
                0 0 15px rgba(100, 181, 246, 0.6),
                0 2px 4px rgba(0, 0, 0, 0.4),
                0 4px 8px rgba(0, 0, 0, 0.3);
            line-height: 1.5;
            margin-bottom: 1rem;
            animation-delay: 0.6s;
        }

        .title-main {
            font-size: 3.5rem;
            animation-delay: 0.8s;
        }

        .title-sub {
            font-size: 4.2rem;
            display: block;
            animation-delay: 1s;
        }

        .subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 2.5rem;
            line-height: 1.6;
            animation-delay: 1.2s;
        }

        .btn {
            display: inline-block;
            padding: 12px 32px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            font-weight: 500;
            animation-delay: 1.4s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .decorative-element {
            position: absolute;
            pointer-events: none;
            z-index: -1;
        }



        .card {
            width: 150px;
            height: 150px;
            opacity: 0.3;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .card-1 {
            top: 10%;
            left: 5%;
            transform: rotate(-15deg);
        }

        .card-2 {
            top: 20%;
            right: 15%;
            transform: rotate(20deg);
        }

        .card-3 {
            bottom: 15%;
            right: 5%;
            transform: rotate(-10deg);
        }

        .star-bg {
            right: 10%;
            top: 50%;
            transform: translateY(-50%);
            width: 500px;
            height: 500px;
        }

        .star-bg img {
            width: 100%;
            height: 100%;
            opacity: 0.6;
        }

        .light-source {
            top: 10%;
            left: 10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(100, 181, 246, 0.4) 0%, rgba(100, 181, 246, 0) 70%);
            border-radius: 50%;
            filter: blur(30px);
            z-index: 5;
            animation-delay: 0.1s;
        }

        .card {
            width: 150px;
            height: 150px;
            opacity: 0.3;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .card-1 {
            top: 10%;
            left: 5%;
            animation: fadeInDownRotate1 1s ease-out forwards;
            animation-delay: 0.3s;
        }

        .card-2 {
            top: 20%;
            right: 15%;
            animation: fadeInDownRotate2 1s ease-out forwards;
            animation-delay: 0.5s;
        }

        .card-3 {
            bottom: 15%;
            right: 5%;
            animation: fadeInDownRotate3 1s ease-out forwards;
            animation-delay: 0.7s;
        }

        .star-bg {
            right: 5%;
            top: 0;
            bottom: 0;
            width: 600px;
            animation-delay: 0.9s;
        }

        .star-bg img {
            width: 100%;
            height: 100%;
            opacity: 0.6;
        }

        .gear-new {
            right: 25%;
            top: 35%;
            transform: translateY(-50%);
            width: 300px;
            height: 300px;
            z-index: 20;
            animation-delay: 1.1s;
        }

        .gear-new img {
            width: 100%;
            height: 100%;
            opacity: 0.9;
        }

        .panel {
            z-index: 15;
        }

        .panel-1 {
            right: 15%;
            top: 25%;
            width: 250px;
            height: 250px;
            transform: rotate(20deg);
            z-index: 10;
            animation-delay: 1.3s;
        }

        .panel-2 {
            right: 15%;
            bottom: 15%;
            width: 280px;
            height: 280px;
            transform: rotate(-10deg);
            animation-delay: 1.5s;
        }

        .panel img {
            width: 100%;
            height: 100%;
            opacity: 0.8;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            z-index: 20;
            animation-delay: 1.6s;
        }

        @media (max-width: 768px) {
            .title-main {
                font-size: 2.5rem;
            }

            .title-sub {
                font-size: 3rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .star-bg {
                display: none;
            }

            .gear-new {
                display: none;
            }

            .panel-1 {
                display: none;
            }

            .panel-2 {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">
                <span class="title-main">机械发明家</span><br>
                <span class="title-sub">零件的奇妙配对</span>
            </h1>
            <p class="subtitle">
                从每一颗螺丝钉与小齿轮中<br>
                悟出机械的大道理
            </p>
            <a href="main-content.html" class="btn">了解详情 &gt;</a>
        </div>
    </div>


    <div class="decorative-element light-source"></div>
    <div class="decorative-element card card-1"></div>
    <div class="decorative-element card card-2"></div>
    <div class="decorative-element card card-3"></div>

    <div class="decorative-element star-bg">
        <img src="images/star.png" alt="星星背景">
    </div>

    <div class="decorative-element gear-new">
        <img src="images/shouyechilun.png" alt="齿轮">
    </div>

    <div class="decorative-element panel panel-1">
        <img src="images/mianban1.png" alt="面板1">
    </div>

    <div class="decorative-element panel panel-2">
        <img src="images/mianban2.png" alt="面板2">
    </div>

    <div class="footer">
        <p>handy制作的小网页</p>
    </div>


</body>
</html>
